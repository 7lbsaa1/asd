<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }</style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 border-l border-slate-800 p-4 flex flex-col">
        <div class="mb-8 mt-4 text-center">
            <h1 class="text-xl font-bold text-blue-400">لوحة الإدارة</h1>
        </div>
        <nav class="space-y-2 flex-1">
            <a href="#" class="block px-4 py-3 bg-blue-600 rounded-lg text-white font-medium">نتائج الامتحانات</a>
            <a href="#" class="block px-4 py-3 text-slate-400 hover:bg-slate-800 rounded-lg transition">الأسئلة</a>
            <a href="#" class="block px-4 py-3 text-slate-400 hover:bg-slate-800 rounded-lg transition">الطلاب</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="bg-slate-800 p-6 flex justify-between items-center shadow-md">
            <div>
                <h2 class="text-2xl font-bold text-white">نتائج الامتحانات</h2>
                <p class="text-slate-400 text-sm mt-1">عرض ومتابعة نتائج الطلاب، وتصحيح الأسئلة المقالية.</p>
            </div>
        </header>

        <div class="p-6 overflow-y-auto flex-1">
            <div class="bg-slate-800 rounded-xl shadow-lg border border-slate-700 overflow-hidden">
                <table class="w-full text-right text-sm">
                    <thead class="bg-slate-900 text-slate-300">
                        <tr>
                            <th class="px-6 py-4">اسم الطالب</th>
                            <th class="px-6 py-4">رقم الهاتف</th>
                            <th class="px-6 py-4">النتيجة (اختياري)</th>
                            <th class="px-6 py-4">حالة التصحيح</th>
                            <th class="px-6 py-4">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTable" class="divide-y divide-slate-700">
                        <!-- البيانات ستضاف هنا عبر الجافاسكريبت -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal for Grading -->
    <div id="gradeModal" class="fixed inset-0 bg-black bg-opacity-75 hidden flex items-center justify-center z-50 p-4 overflow-y-auto">
        <div class="bg-slate-800 rounded-xl w-full max-w-3xl shadow-2xl p-6 border border-slate-600 my-8">
            <h2 class="text-2xl font-bold mb-4 text-blue-400" id="modalStudentName">تصحيح امتحان: </h2>
            <div id="essayQuestionsContainer" class="space-y-6">
                <!-- أسئلة المقالي ستظهر هنا للتصحيح -->
            </div>
            <div class="mt-8 flex justify-end gap-4 border-t border-slate-700 pt-4">
                <button onclick="closeModal()" class="px-6 py-2 bg-slate-600 rounded-lg hover:bg-slate-500 transition">إلغاء</button>
                <button id="publishBtn" class="px-6 py-2 bg-green-600 rounded-lg hover:bg-green-500 font-bold transition">اعتماد وإظهار النتيجة</button>
            </div>
        </div>
    </div>

    <!-- Firebase & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWTSFTecq2_QeDyg90mM1hPNytwPXYyZ0",
            authDomain: "admin-37e09.firebaseapp.com",
            databaseURL: "https://admin-37e09-default-rtdb.firebaseio.com",
            projectId: "admin-37e09",
            storageBucket: "admin-37e09.firebasestorage.app",
            messagingSenderId: "637953105703",
            appId: "1:637953105703:web:db22cf323186b157de5302"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentSubmissions = {};
        let selectedPhone = null;

        const submissionsRef = ref(db, 'submissions');
        onValue(submissionsRef, (snapshot) => {
            const data = snapshot.val();
            currentSubmissions = data || {};
            renderTable();
        });

        function renderTable() {
            const tbody = document.getElementById('studentsTable');
            tbody.innerHTML = '';
            
            Object.values(currentSubmissions).forEach(sub => {
                const statusBadge = sub.status === 'pending' 
                    ? '<span class="px-2 py-1 bg-yellow-900 text-yellow-300 rounded text-xs font-bold">بانتظار التصحيح</span>'
                    : '<span class="px-2 py-1 bg-green-900 text-green-300 rounded text-xs font-bold">تم النشر</span>';

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-750 transition">
                        <td class="px-6 py-4 font-medium text-white">${sub.name}</td>
                        <td class="px-6 py-4 text-slate-300">${sub.phone}</td>
                        <td class="px-6 py-4 text-blue-400 font-bold">${sub.mcqScore} / ${sub.totalMcq}</td>
                        <td class="px-6 py-4">${statusBadge}</td>
                        <td class="px-6 py-4">
                            <button onclick="openModal('${sub.phone}')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded shadow transition text-sm">
                                عرض الامتحان والتصحيح
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        window.openModal = function(phone) {
            selectedPhone = phone;
            const sub = currentSubmissions[phone];
            document.getElementById('modalStudentName').innerText = `تصحيح امتحان: ${sub.name}`;
            
            const container = document.getElementById('essayQuestionsContainer');
            container.innerHTML = '';

            // استخراج الأسئلة المقالية (التي تبدأ من 49)
            const essayIds = [49, 50, 51, 52];
            
            essayIds.forEach(id => {
                const studentAns = sub.answers[id] || 'لم يجب';
                container.innerHTML += `
                    <div class="bg-slate-900 p-4 rounded-lg border border-slate-700" data-id="${id}">
                        <h4 class="text-lg font-bold mb-2 text-slate-200">سؤال ${id}:</h4>
                        <div class="mb-3 text-slate-400 bg-slate-800 p-3 rounded">إجابة الطالب: <span class="text-white font-medium">${studentAns}</span></div>
                        
                        <div class="flex gap-4 items-center">
                            <label class="flex items-center gap-2 cursor-pointer text-green-400">
                                <input type="radio" name="grade_${id}" value="true" class="w-4 h-4" onchange="toggleCorrectionField(${id}, false)"> صحيح
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer text-red-400">
                                <input type="radio" name="grade_${id}" value="false" class="w-4 h-4" onchange="toggleCorrectionField(${id}, true)"> خطأ
                            </label>
                        </div>
                        <input type="text" id="correction_${id}" class="mt-3 w-full bg-slate-800 border border-slate-600 rounded p-2 text-white hidden placeholder-slate-500" placeholder="اكتب الإجابة الصحيحة هنا ليرها الطالب...">
                    </div>
                `;
            });

            document.getElementById('gradeModal').classList.remove('hidden');
        };

        window.toggleCorrectionField = function(id, show) {
            const field = document.getElementById(`correction_${id}`);
            if(show) {
                field.classList.remove('hidden');
            } else {
                field.classList.add('hidden');
                field.value = '';
            }
        };

        window.closeModal = function() {
            document.getElementById('gradeModal').classList.add('hidden');
        };

        document.getElementById('publishBtn').addEventListener('click', () => {
            const sub = currentSubmissions[selectedPhone];
            let essayScore = 0;
            let teacherCorrections = {};
            const essayIds = [49, 50, 51, 52];
            
            let allGraded = true;

            essayIds.forEach(id => {
                const radios = document.getElementsByName(`grade_${id}`);
                let checked = null;
                radios.forEach(r => { if(r.checked) checked = r.value; });
                
                if(!checked) allGraded = false;
                
                if(checked === 'true') {
                    essayScore++;
                } else if (checked === 'false') {
                    teacherCorrections[id] = document.getElementById(`correction_${id}`).value;
                }
            });

            if(!allGraded) {
                alert('الرجاء تقييم جميع الأسئلة المقالية قبل الاعتماد.');
                return;
            }

            const finalScore = sub.mcqScore + essayScore;

            // تحديث حالة الطالب في قاعدة البيانات
            const updates = {};
            updates[`submissions/${selectedPhone}/status`] = 'graded';
            updates[`results/${selectedPhone}`] = {
                finalScore: finalScore,
                teacherCorrections: teacherCorrections,
                isPublished: true
            };

            update(ref(db), updates).then(() => {
                alert('تم اعتماد النتيجة ونشرها للطالب بنجاح!');
                closeModal();
            });
        });
    </script>
</body>
</html>
